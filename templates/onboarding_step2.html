<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#06060c">
    <title>Choose Industry - {{ service_config.app_title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;600&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/solpunk.css') }}" rel="stylesheet">
</head>
<body>
    <div class="sp-container">
        <div class="sp-section sp-text-center">
            <h1>Step 2: Your Industry</h1>
            <p class="sp-text-muted">Select your service type to auto-configure task templates</p>
        </div>
        <div class="sp-card" style="max-width: 600px; margin: 0 auto;">
            <div class="sp-card-body">
                <div class="sp-grid sp-grid-2">
                    {% for service_id, service_name in service_types %}
                    <a href="{{ url_for('onboarding_step', step=3) }}" class="sp-btn sp-btn--ghost" style="padding: 20px; text-align: center; display: block;">
                        {{ service_name }}
                    </a>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="sp-footer">
            <span class="sp-ohananaho">OhananahO</span>
            <br>ServiceFlowEngine &middot; Drake Enterprise LLC
        </div>
    </div>
</body>
</html>
